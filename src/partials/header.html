<header id="header" class="header" data-dev="Header Section">
  <div class="container">
    <div class="header__inner">
      <a href="./index.html" class="header__logo logo-link">
        <img
          src="./img/logo.svg"
          alt="Cinemania"
          class="nav-logo"
          width="45"
          height="36"
          decoding="async"
        />
        <span class="logo-text">Cinemania</span>
      </a>

      <nav class="header__nav desktop-nav">
        <a href="./index.html" class="nav-link" data-page="home">HOME</a>
        <a href="./catalog.html" class="nav-link" data-page="catalog"
          >CATALOG</a
        >
        <a href="./library.html" class="nav-link" data-page="library"
          >MY LIBRARY</a
        >
      </nav>

      <nav class="mobile-nav">
        <div class="mobile-menu-logo">
          <a href="./index.html" class="logo-link">
            <img
              src="./img/logo.svg"
              alt="Cinemania"
              class="nav-logo"
              width="45"
              height="36"
              decoding="async"
            />
            <span class="logo-text">Cinemania</span>
          </a>
        </div>
        <a href="./index.html" class="nav-link" data-page="home">HOME</a>
        <a href="./catalog.html" class="nav-link" data-page="catalog"
          >CATALOG</a
        >
        <a href="./library.html" class="nav-link" data-page="library"
          >MY LIBRARY</a
        >
      </nav>

      <button class="header__menu-btn" id="menuToggle">MENU</button>

      <div class="header__controls">
        <button class="theme-toggle" aria-label="Toggle theme">
          <span class="toggle-track">
            <img
              src="./img/moon.svg"
              class="icon moon"
              alt="moon"
              width="14"
              height="14"
              decoding="async"
            />
            <img
              src="./img/sun.svg"
              class="icon sun"
              alt="sun"
              width="14"
              height="14"
              decoding="async"
            />
            <span class="toggle-thumb"></span>
          </span>
        </button>
      </div>
    </div>
  </div>
</header>
