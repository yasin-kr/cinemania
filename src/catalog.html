<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/svg+xml" href="./img/logo.svg" />
    <link rel="preconnect" href="https://image.tmdb.org" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <link rel="stylesheet" href="./css/styles.css" />
    <title>Cinemania - Catalog</title>
  </head>
  <body>
    <load src="./partials/header.html" />

    <main>
      <load src="./partials/hero.html" />

      <section class="catalog-section">
        <div class="container">
          <load src="./partials/searcher.html" />

          <ul class="movie-grid" id="movieGrid"></ul>

          <div class="oops-message hidden" id="oopsMessage">
            <img src="./img/oops-logo.png" alt="Sonuç bulunamadı" />
            <p>We are very sorry!</p>
            <p>You don't have any results matching your search.</p>
          </div>

          <div class="pagination" id="pagination"></div>
        </div>
      </section>
    </main>

    <load src="./partials/footer.html" />

    <script type="module" src="./js/catalog.js"></script>
  </body>
</html>
